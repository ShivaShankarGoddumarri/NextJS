[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file as a
# standalone script, running it in the current process
# for using the production database as the target
# for migrations
# standalone_mode = false

# set to 'true' to use transactions to wrap
# each migration, if the database driver supports it
# transactional_ddl = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as a compiled module
# sourced_modules =

# set to 'true' to enable sql compilation caching
# sql_compile_cache = false

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path
# version_locations = %(here)s/alembic/versions

# the 'revisions' table to use to track migrations
# in the target database.  It can also be configured per-environment.
# revision_environment_table = alembic_revisions

[post_write_hooks]
# post_write_hooks defines scripts or Python functions to run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using 'black' - use the console_scripts runner, against the script
# location.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic